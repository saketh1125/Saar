name: Firebase Functions CI

on:
  push:
    branches: [main]
    paths:
      - 'firebase/**'
  pull_request:
    branches: [main]
    paths:
      - 'firebase/**'

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase/functions

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
