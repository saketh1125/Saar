name: kashi_nav
description: "Kashi Nav — local-first, AI-agent travel companion for Varanasi (Kashi)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management & DI
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.2.0

  # Navigation & Routing
  go_router: ^12.0.0

  # Mapping & GIS (OSM stack)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  flutter_map_cache: ^1.3.0
  geolocator: ^10.1.0
  flutter_compass: ^0.8.0

  # Local DB & Caching
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.8.0

  # Audio Player (Tours & Alarms)
  just_audio: ^0.9.36
  audio_session: ^0.1.18

  # Voice Assistant
  record: ^5.0.0
  flutter_tts: ^3.8.0

  # Device Integrations
  android_alarm_manager_plus: ^3.0.0
  connectivity_plus: ^5.0.2
  permission_handler: ^11.0.1

  # Networking
  dio: ^5.4.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  uuid: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.3
  build_runner: ^2.4.7
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
